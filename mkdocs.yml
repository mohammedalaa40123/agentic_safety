site_name: Agentic Safety Evaluation Framework
site_description: >-
  Research documentation for agentic jailbreak attack evaluation —
  covering the PAIR mini-benchmark, OWASP AAI threat taxonomy,
  attack and defense methods, metrics definitions, and reproducibility guidance.
site_url: https://mohammedalaa40123.github.io/agentic_safety/
repo_url: https://github.com/mohammedalaa40123/agentic_safety
repo_name: GitHub
site_dir: site
docs_dir: docs

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep-purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep-purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://unpkg.com/mermaid@10.9.1/dist/mermaid.min.js
  - javascripts/mermaid.js

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mohammedalaa40123/agentic_safety
      name: GitHub Repository
    - icon: fontawesome/solid/database
      link: https://huggingface.co/datasets/Mo-alaa/agentic-safety-results
      name: Results Dataset

nav:
  - Home: index.md
  - Threat Model:
      - Overview: threat-model/index.md
      - OWASP AAI Top-10: threat-model/owasp-aai.md
      - Attack Surfaces: threat-model/attack-surfaces.md
  - Attacks:
      - Overview: attacks/index.md
      - PAIR: attacks/pair.md
      - Crescendo: attacks/crescendo.md
      - Prompt Fusion: attacks/prompt-fusion.md
      - Hybrid Orchestration: attacks/hybrid.md
  - Defenses:
      - Overview: defenses/index.md
      - JBShield: defenses/jbshield.md
      - Gradient Cuff: defenses/gradient-cuff.md
      - Progent: defenses/progent.md
      - StepShield: defenses/stepshield.md
  - Evaluation:
      - Benchmark Methodology: evaluation/index.md
      - Metrics (ASR/TIR/DBR/QTJ): evaluation/metrics.md
      - Results & Leaderboard: evaluation/results.md
      - Reproducibility: evaluation/reproducibility.md
  - Providers:
      - Overview: providers/index.md
      - OpenAI & Gemini: providers/cloud.md
      - Ollama & Local: providers/local.md
      - RCAC HPC: providers/rcac.md
  - Getting Started:
      - Quickstart: getting-started/quickstart.md
      - Configuration: getting-started/configuration.md
      - Project Overview: getting-started/overview.md
  - Architecture:
      - System Overview: architecture/system-overview.md
      - Execution Flows: architecture/execution-flows.md
      - Threat and Defense: architecture/threat-defense.md
  - Deployment:
      - GitHub Pages: deployment/github-pages.md
      - Hugging Face Space: deployment/hf-space-launch.md
      - Running Experiments: deployment/experiments.md
      - Sandbox Isolation: deployment/sandboxing.md
  - Reference:
      - Directory Map: reference/directory-map.md
      - File Inventory: reference/file-inventory.md
