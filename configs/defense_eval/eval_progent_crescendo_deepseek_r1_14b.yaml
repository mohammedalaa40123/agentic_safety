experiment_name: defense_progent_crescendo_deepseek_r1_14b
description: 'Defense evaluation: progent against crescendo on deepseek-r1:14b (50
  CTF scenarios)'
mode: attack
output_dir: results/defense_eval/progent/crescendo_deepseek_r1_14b
goals_path: data/agentic_scenarios_owasp_top10_50.json
models:
  attack_model: genai:llama3.3:70b
  target_model: genai:deepseek-r1:14b
  judge_model: genai:llama3.3:70b
  attack_max_n_tokens: 2048
  target_max_n_tokens: 1024
  judge_max_n_tokens: 1024
  attack_calls_per_minute: 20
  target_calls_per_minute: 20
  judge_calls_per_minute: 20
sandbox:
  enabled: true
  persistent: true
  tools:
  - file_io
  - code_exec
  - web_browse
  - network
  max_steps: 5
attacks:
- name: crescendo
  enabled: true
  stop_on_success: false
  params:
    max_turns: 10
    escalation_stages: 5
    benign_warmup_turns: 2
    patience: 3
    context_window: 6
defenses:
  enabled: true
  active:
  - progent
  progent:
    policy_mode: strict
logging:
  verbose: true
